name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v27
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - name: Run Tests
      run: |
        nix develop --command sh -c "export IDRIS2_PREFIX=\$PWD/local_install && idris2 --install penultimate.ipkg && idris2 --build tests/native.ipkg && idris2 --build tests/browser.ipkg"
        nix develop --command sh -c "tests/build/exec/tests_native"
        nix develop --command sh -c "node tests/build/exec/tests_browserjs"
    - name: Build Examples
      run: |
        nix develop --command sh -c "export IDRIS2_PREFIX=\$PWD/local_install && idris2 --build examples/console.ipkg && idris2 --build examples/web.ipkg"
    - name: Upload Web Artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-example
        path: examples/build/exec/webjs

  deploy-pages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: web-example
        path: web-example
    - name: Create index.html
      run: |
        echo '<!DOCTYPE html><html><head><title>Penultimate Web</title></head><body><div id="penultimate-root"></div><script src="webjs"></script></body></html>' > web-example/index.html
    - name: Setup Pages
      uses: actions/configure-pages@v4
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: './web-example'
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  pr-comment:
    needs: build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - name: Find PR Comment
      uses: peter-evans/find-comment@v3
      id: fc
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
        body-includes: 'Test the Web Example here'
    - name: Create or update PR Comment
      uses: peter-evans/create-or-update-comment@v4
      with:
        comment-id: ${{ steps.fc.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          ### Test the Web Example here! :rocket:

          Since Github Pages only hosts the `main` branch, you can test this PR by downloading the `web-example` artifact from the Actions tab and opening `index.html` locally.

          *(Once merged to `main`, the web example will be available live at `https://${{ github.repository_owner }}.github.io/penultimate/`)*
        edit-mode: replace
