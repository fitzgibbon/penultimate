<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Penultimate Terminal</title>
    <style>
        body { background: black; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; }
        #terminal { display: grid; grid-template-rows: repeat(24, 1fr); grid-template-columns: repeat(80, 1fr); background-color: black; border: 1px solid #333; line-height: 1; }
        .cell { display: flex; align-items: center; justify-content: center; width: 10px; height: 20px; white-space: pre; }
        #menu { margin-bottom: 20px; }
        button { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; }
        button:hover { background: #555; }
    </style>
</head>
<body>
    <div id="menu">
        <button onclick="runExample(1)">1: Hello World</button>
        <button onclick="runExample(2)">2: Colors</button>
        <button onclick="runExample(3)">3: Input Echo</button>
        <button onclick="runExample(4)">4: Bordered Window</button>
        <button onclick="runExample(5)">5: Animation</button>
        <button onclick="runExample(6)">6: Roguelike</button>
        <button onclick="runExample(7)">7: Mandelbrot</button>
        <button onclick="runExample(8)">8: Matrix Rain</button>
        <button onclick="runExample(9)">9: Bouncing Ball</button>
        <button onclick="runExample(10)">10: Drawing App</button>
    </div>
    <div id="terminal"></div>
    <script>
        const terminal = document.getElementById('terminal');
        const rows = 24;
        const cols = 80;
        const grid = [];

        window.penultimate_initDOM = function() {
            terminal.innerHTML = '';
            for (let r = 0; r < rows; r++) {
                grid[r] = [];
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = ' ';
                    terminal.appendChild(cell);
                    grid[r][c] = cell;
                }
            }
        };

        window.penultimate_shutdownDOM = function() {
            terminal.innerHTML = '';
        };

        window.penultimate_clearDOM = function() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    grid[r][c].textContent = ' ';
                    grid[r][c].style.color = '';
                    grid[r][c].style.backgroundColor = '';
                }
            }
        };

        window.penultimate_drawChar = function(r, c, fg, bg, ch) {
            if (r >= 0 && r < rows && c >= 0 && c < cols) {
                const el = grid[r][c];
                el.textContent = ch;
                el.style.color = fg;
                el.style.backgroundColor = bg;
            }
        };

        window.penultimate_inputBuffer = [];
        window.addEventListener('keydown', e => {
            if (e.key.length === 1) {
                window.penultimate_inputBuffer.push(e.key);
            }
        });

        window.penultimate_readChar = function() {
            if (window.penultimate_inputBuffer.length > 0) {
                return window.penultimate_inputBuffer.shift();
            }
            return '\0';
        };

        window.penultimate_pollChar = function() {
            if (window.penultimate_inputBuffer.length > 0) {
                return window.penultimate_inputBuffer.shift();
            }
            return null;
        };

        function runExample(num) {
            if (grid.length === 0) window.penultimate_initDOM();
            window.penultimate_clearDOM();
            window.process = { argv: ["node", "main.js", num.toString()] };
            try {
                if (typeof Main__main !== 'undefined') {
                    Main__main();
                } else if (typeof Main__runExampleBrowser !== 'undefined') {
                    Main__runExampleBrowser(num);
                }
            } catch (e) {
                console.log("Idris execution:", e);
            }
        }

        window.onload = function() { window.penultimate_initDOM(); };
    </script>
    <script src="build/exec/penultimate-browser.js"></script>
</body>
</html>
